<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar H10 HR Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #20c997 0%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 0.9em;
            color: #8a92a0;
            font-weight: 400;
        }

        .container {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.08);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 520px;
            backdrop-filter: blur(20px);
        }

        .meter-container {
            position: relative;
            margin-bottom: 32px;
        }

        .meter-zone {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .zone-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 60px;
        }

        .zone-label {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8a92a0;
        }

        .zone-input {
            width: 60px;
            padding: 10px 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            cursor: text;
        }

        .zone-input:focus {
            outline: none;
            border-color: rgba(32, 201, 151, 0.5);
            background: rgba(32, 201, 151, 0.1);
            box-shadow: 0 0 12px rgba(32, 201, 151, 0.2);
        }

        .zone-color-bar {
            width: 60px;
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .zone-0 { background: linear-gradient(90deg, #5a6268 0%, #6c757d 100%); }
        .zone-1 { background: linear-gradient(90deg, #0099ff 0%, #00bfff 100%); }
        .zone-2 { background: linear-gradient(90deg, #20c997 0%, #4ecdc4 100%); }
        .zone-3 { background: linear-gradient(90deg, #ffc107 0%, #ffeb3b 100%); }
        .zone-4 { background: linear-gradient(90deg, #ff8c42 0%, #ffb347 100%); }
        .zone-5 { background: linear-gradient(90deg, #ff3b30 0%, #ff6b6b 100%); }

        .stats {
            margin-top: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat:hover {
            background: rgba(32, 201, 151, 0.08);
            border-color: rgba(32, 201, 151, 0.3);
        }

        .stat-label {
            font-size: 0.85em;
            color: #8a92a0;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #20c997;
        }

        .status-container {
            margin-top: 24px;
            width: 100%;
        }

        .status-bar {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff8c42;
            box-shadow: 0 0 8px rgba(255, 140, 66, 0.6);
            animation: pulse-orange 2s infinite;
        }

        .status-indicator.connected {
            background: #20c997;
            box-shadow: 0 0 8px rgba(32, 201, 151, 0.6);
            animation: pulse-green 2s infinite;
        }

        .status-indicator.error {
            background: #ff3b30;
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes pulse-orange {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-text {
            font-size: 0.9em;
            font-weight: 500;
            color: #8a92a0;
        }

        .status-text .status-label {
            color: #fff;
            font-weight: 600;
            margin: 0;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(32, 201, 151, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(32, 201, 151, 0.5);
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .meter-zone {
                gap: 4px;
            }

            .zone-item {
                min-width: 50px;
            }

            .zone-input {
                width: 50px;
                font-size: 0.8em;
                padding: 8px 6px;
            }

            .zone-color-bar {
                width: 50px;
            }

            .stat-value {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Polar H10</h1>
        <p class="subtitle">Heart Rate Monitor</p>
    </div>

    <div class="container">
        <div class="meter-container">
            <canvas id="hrMeter" width="360" height="200"></canvas>
        </div>

        <div class="meter-zone">
            <div class="zone-item">
                <span class="zone-label">Zone 0</span>
                <input class="zone-input" id="zone0" type="number" value="90">
                <div class="zone-color-bar zone-0"></div>
            </div>
            <div class="zone-item">
                <span class="zone-label">Zone 1</span>
                <input class="zone-input" id="zone1" type="number" value="110">
                <div class="zone-color-bar zone-1"></div>
            </div>
            <div class="zone-item">
                <span class="zone-label">Zone 2</span>
                <input class="zone-input" id="zone2" type="number" value="130">
                <div class="zone-color-bar zone-2"></div>
            </div>
            <div class="zone-item">
                <span class="zone-label">Zone 3</span>
                <input class="zone-input" id="zone3" type="number" value="150">
                <div class="zone-color-bar zone-3"></div>
            </div>
            <div class="zone-item">
                <span class="zone-label">Zone 4</span>
                <input class="zone-input" id="zone4" type="number" value="170">
                <div class="zone-color-bar zone-4"></div>
            </div>
            <div class="zone-item">
                <span class="zone-label">Zone 5</span>
                <input class="zone-input" id="zone5" type="number" value="190">
                <div class="zone-color-bar zone-5"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Average HR</div>
                <div class="stat-value" id="avgHr">--</div>
            </div>
            <div class="stat">
                <div class="stat-label">Max HR</div>
                <div class="stat-value" id="maxHr">--</div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator"></div>
                <div class="status-text">
                    <span class="stat-label">Connection Status</span><br>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
        </div>
    </div>
<script>
    // ===== Configuration =====
    const canvas = document.getElementById('hrMeter');
    const ctx = canvas.getContext('2d');
    const centerX = canvas.width / 2;
    const centerY = canvas.height * 0.85;
    const radius = 140;
    const minAngle = Math.PI * 0.75;
    const maxAngle = Math.PI * 0.25;

    // Polar Flow Colors - Professional Sport Theme (Polar.com scheme)
    const polarColors = {
        zones: [
            { name: 'Recovery', color: '#5a6268', glow: 'rgba(90, 98, 104, 0.5)' },
            { name: 'Light', color: '#0099ff', glow: 'rgba(0, 153, 255, 0.5)' },
            { name: 'Aerobic', color: '#20c997', glow: 'rgba(32, 201, 151, 0.5)' },
            { name: 'Tempo', color: '#ffc107', glow: 'rgba(255, 193, 7, 0.5)' },
            { name: 'Threshold', color: '#ff8c42', glow: 'rgba(255, 140, 66, 0.5)' },
            { name: 'Maximum', color: '#ff3b30', glow: 'rgba(255, 59, 48, 0.5)' }
        ],
        accent: '#20c997',
        accentSecondary: '#00d9ff',
        text: '#ffffff',
        subtext: '#8a92a0',
        grid: 'rgba(255, 255, 255, 0.08)'
    };

    let hr = 0;
    let avgHr = 0;
    let maxHr = 0;
    let hrHistory = [];
    let zones = [90, 110, 130, 150, 170, 190];

    // Determine which zone the HR value is in
    function getZoneIndex(hrValue) {
        if (hrValue < zones[0]) return 0;
        for (let i = 0; i < zones.length - 1; i++) {
            if (hrValue >= zones[i] && hrValue < zones[i + 1]) return i + 1;
        }
        return zones.length - 1;
    }

    // Get the color for the current HR zone
    function getZoneColor(hrValue) {
        const zoneIndex = getZoneIndex(hrValue);
        return polarColors.zones[zoneIndex].color;
    }

    function drawMeter(hrValue) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Get zone-specific color for current HR
        const zoneColor = getZoneColor(hrValue);
        const zoneGlowColor = polarColors.zones[getZoneIndex(hrValue)].glow;

        // Draw gradient background circle
        const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius + 20);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.02)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius + 20, 0, 2 * Math.PI);
        ctx.fill();

        // Draw zone arcs with glow effect
        let last = 0;
        for (let i = 0; i < zones.length; i++) {
            const start = last;
            const end = zones[i];
            const startAngle = minAngle + (maxAngle - minAngle) * (start / zones[zones.length - 1]);
            const endAngle = minAngle + (maxAngle - minAngle) * (end / zones[zones.length - 1]);

            // Glow effect
            ctx.strokeStyle = polarColors.zones[i].glow;
            ctx.lineWidth = 36;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle, false);
            ctx.stroke();

            // Draw the entire arc in the current zone color (single color, not multi-colored)
            ctx.strokeStyle = zoneColor;
            ctx.lineWidth = 28;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, minAngle, maxAngle, false);
            ctx.stroke();

            // Optionally, draw a glow effect in the current zone's glow color
            ctx.strokeStyle = zoneGlowColor;
            ctx.lineWidth = 36;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, minAngle, maxAngle, false);
            ctx.stroke();

            last = end;
        }

        // Draw grid lines
        ctx.strokeStyle = polarColors.grid;
        ctx.lineWidth = 1;
        for (let i = 0; i <= 10; i++) {
            const angle = minAngle + (maxAngle - minAngle) * (i / 10);
            const x1 = centerX + Math.cos(angle) * (radius - 30);
            const y1 = centerY + Math.sin(angle) * (radius - 30);
            const x2 = centerX + Math.cos(angle) * (radius + 10);
            const y2 = centerY + Math.sin(angle) * (radius + 10);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        // Draw tick marks and labels
        ctx.fillStyle = polarColors.text;
        ctx.font = 'bold 11px "Inter", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (let i = 0; i <= zones.length; i++) {
            const val = i === 0 ? 0 : zones[i - 1];
            const angle = minAngle + (maxAngle - minAngle) * (val / zones[zones.length - 1]);

            // Tick point
            const x = centerX + Math.cos(angle) * (radius + 15);
            const y = centerY + Math.sin(angle) * (radius + 15);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = polarColors.text;
            ctx.fill();

            // Label
            const labelX = centerX + Math.cos(angle) * (radius + 35);
            const labelY = centerY + Math.sin(angle) * (radius + 35);
            ctx.fillStyle = polarColors.subtext;
            ctx.font = '10px "Inter", sans-serif';
            ctx.fillText(val, labelX, labelY);
        }

        // Draw needle with glow - COLOR CHANGES BASED ON ZONE
        const needleAngle = minAngle + (maxAngle - minAngle) * (hrValue / zones[zones.length - 1]);
        const nx = centerX + Math.cos(needleAngle) * (radius - 45);
        const ny = centerY + Math.sin(needleAngle) * (radius - 45);

        // Needle glow with zone color
        ctx.strokeStyle = zoneGlowColor;
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(nx, ny);
        ctx.stroke();

        // Needle with zone color
        ctx.strokeStyle = zoneColor;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(nx, ny);
        ctx.stroke();

        // Center circle with zone color
        ctx.fillStyle = zoneColor;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
        ctx.fill();

        // Draw HR value with zone color
        ctx.font = 'bold 56px "Inter", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = zoneColor;
        ctx.fillText(hrValue ? hrValue : '--', centerX, centerY - 50);

        // Draw BPM unit
        ctx.font = '14px "Inter", sans-serif';
        ctx.fillStyle = polarColors.subtext;
        ctx.fillText('BPM', centerX, centerY - 20);
    }

    function updateStats() {
        if (hrHistory.length > 0) {
            avgHr = Math.round(hrHistory.reduce((a, b) => a + b, 0) / hrHistory.length);
            maxHr = Math.max(...hrHistory);
            document.getElementById('avgHr').textContent = avgHr;
            document.getElementById('maxHr').textContent = maxHr;
        }
    }

    function updateConnectionStatus(connected, error = false) {
        const indicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        indicator.className = 'status-indicator';

        if (error) {
            indicator.classList.add('error');
            statusText.textContent = 'Connection Error';
        } else if (connected) {
            indicator.classList.add('connected');
            statusText.textContent = 'Connected & Syncing';
        } else {
            statusText.textContent = 'Disconnected - Waiting...';
        }
    }

    // Zone inputs event listeners
    for (let i = 0; i < 6; i++) {
        document.getElementById('zone' + i).addEventListener('change', function() {
            zones[i] = parseInt(this.value) || zones[i];
            drawMeter(hr);
        });
    }

    // Initial draw
    drawMeter(0);

    // ===== WebSocket Real-Time HR Data Integration =====
    let wsReconnectAttempts = 0;
    const maxReconnectAttempts = 10;
    let reconnectTimeout;

    function connectWebSocket() {
        try {
            const ws = new WebSocket('ws://localhost:9001');

            ws.onopen = () => {
                console.log('Connected to HR stream');
                updateConnectionStatus(true);
                wsReconnectAttempts = 0;
            };

            ws.onclose = () => {
                console.log('Disconnected from HR stream');
                updateConnectionStatus(false);

                // Attempt reconnection with exponential backoff
                if (wsReconnectAttempts < maxReconnectAttempts) {
                    wsReconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(1.5, wsReconnectAttempts), 30000);
                    reconnectTimeout = setTimeout(connectWebSocket, delay);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false, true);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    // If HR is 0 or not a number, treat as disconnected
                    if (!data.hr || isNaN(data.hr) || data.hr === 0) {
                        hr = 0;
                        hrHistory = [];
                        drawMeter(0);
                        updateStats();
                        updateConnectionStatus(false);
                    } else {
                        hr = Math.round(data.hr);
                        hrHistory.push(hr);
                        if (hrHistory.length > 200) hrHistory.shift();
                        drawMeter(hr);
                        updateStats();
                    }
                } catch (e) {
                    console.error('Error parsing HR data:', e);
                }
            };

        } catch (error) {
            console.error('WebSocket connection error:', error);
            updateConnectionStatus(false, true);

            if (wsReconnectAttempts < maxReconnectAttempts) {
                wsReconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(1.5, wsReconnectAttempts), 30000);
                reconnectTimeout = setTimeout(connectWebSocket, delay);
            }
        }
    }

    connectWebSocket();

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
    });
</script>
</body>
</html>
